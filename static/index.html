<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="/static/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#111827">
<title>OpenEar</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111827;
    --text: #f1f0eb;
    --text-dim: #9ca3af;
    --accent: #60a5fa;
    --danger: #f87171;
    --surface: #1f2937;
    --font-size: 32px;
  }

  html.light {
    --bg: #f5f5f0;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --accent: #3b82f6;
    --danger: #ef4444;
    --surface: #e5e5e0;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s, color 0.3s;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* --- Top bar --- */
  #top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    z-index: 20;
  }

  #status {
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--surface);
    color: var(--text-dim);
    transition: all 0.3s ease;
  }

  #status.connected { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
  #status.error { background: rgba(248, 113, 113, 0.15); color: #f87171; }

  #controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ctrl-btn {
    width: 40px;
    height: 40px;
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    color: var(--text-dim);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Exo 2', sans-serif;
    transition: background 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:active { background: #374151; }
  html.light .ctrl-btn:active { background: #d1d5db; }

  /* --- Transcript area --- */
  #transcript-area {
    flex: 1;
    overflow-y: auto;
    padding: 60px 20px 100px 20px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  #transcript {
    font-size: var(--font-size);
    line-height: 1.55;
    letter-spacing: 0.01em;
    font-weight: 400;
    max-width: 900px;
    margin: 0 auto;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .chunk { display: inline; }

  .chunk-new { animation: fadeIn 0.3s ease-out; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* --- Disabled banner (fixed bottom) --- */
  #disabled-banner {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 15;
    text-align: center;
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: rgba(248, 113, 113, 0.12);
    border-top: 2px solid var(--danger);
  }

  #disabled-banner.visible {
    display: block;
  }

  #disabled-banner .disabled-text {
    font-size: 22px;
    font-weight: 800;
    color: var(--danger);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  #disabled-banner .disabled-sub,
  #server-down-banner .disabled-sub {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    margin-top: 4px;
  }

  #server-down-banner {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 16;
    text-align: center;
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: rgba(248, 113, 113, 0.12);
    border-top: 2px solid var(--danger);
  }

  #server-down-banner.visible {
    display: block;
  }

  #server-down-banner .disabled-text {
    font-size: 22px;
    font-weight: 800;
    color: var(--danger);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* --- Empty state --- */
  #empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    text-align: center;
    color: var(--text-dim);
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #empty-state.hidden { opacity: 0; }
  #empty-state p { font-size: 18px; line-height: 1.6; font-weight: 600; }

  /* --- Clear button --- */
  #clear-btn {
    position: fixed;
    bottom: 16px;
    right: 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 10px 20px;
    background: var(--surface);
    color: var(--text-dim);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    z-index: 20;
    opacity: 0.6;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  #clear-btn:hover, #clear-btn:active { opacity: 1; }

  /* --- Scrollbar --- */
  #transcript-area::-webkit-scrollbar { width: 4px; }
  #transcript-area::-webkit-scrollbar-track { background: transparent; }
  #transcript-area::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <div id="status">Connecting...</div>
    <div id="controls">
      <button class="ctrl-btn" onclick="adjustSize(-4)" aria-label="Smaller text">A-</button>
      <button class="ctrl-btn" onclick="adjustSize(4)" aria-label="Larger text">A+</button>
      <button class="ctrl-btn theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark mode" id="theme-btn">
        <svg id="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </div>

  <div id="transcript-area">
    <div id="empty-state">
      <p>Waiting for captions...</p>
    </div>
    <div id="transcript"></div>
  </div>

  <button id="clear-btn" onclick="clearTranscript()">Clear</button>

  <div id="disabled-banner">
    <div class="disabled-text">OpenEar Disabled</div>
    <div class="disabled-sub">Captioning will appear here when enabled</div>
  </div>

  <div id="server-down-banner">
    <div class="disabled-text">Server Unavailable</div>
    <div class="disabled-sub">Attempting to reconnect...</div>
  </div>
</div>

<script>
// ============================================================================
// DOM REFERENCES
// ============================================================================

const transcript = document.getElementById('transcript');
const transcriptArea = document.getElementById('transcript-area');
const emptyState = document.getElementById('empty-state');
const disabledBanner = document.getElementById('disabled-banner');
const serverDownBanner = document.getElementById('server-down-banner');
const statusBadge = document.getElementById('status');
const themeBtn = document.getElementById('theme-btn');

let ws = null;                  // Current WebSocket connection
let isCapturing = false;        // Whether the server is actively transcribing
let reconnectTimeout = null;    // Timer handle for auto-reconnect
let autoScroll = true;          // Whether to auto-scroll as new text arrives

// ============================================================================
// FONT SIZE
// ============================================================================
// Persisted in localStorage so each user's preference survives page reloads.
// The A+/A- buttons in the top bar call adjustSize(). Clamped to 18-72px.

let fontSize = parseInt(localStorage.getItem('openear-font-size') || '32');
document.documentElement.style.setProperty('--font-size', fontSize + 'px');

function adjustSize(delta) {
  fontSize = Math.max(18, Math.min(72, fontSize + delta));
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
  localStorage.setItem('openear-font-size', fontSize);
}

// ============================================================================
// THEME (LIGHT / DARK)
// ============================================================================
// Toggled via the sun/moon button in the top bar. Persisted in localStorage.
// Also updates the <meta theme-color> tag so the mobile browser chrome
// (address bar, status bar) matches the page background.

let theme = localStorage.getItem('openear-theme') || 'dark';
applyTheme(theme);

function applyTheme(t) {
  theme = t;
  const iconDark = document.getElementById('theme-icon-dark');
  const iconLight = document.getElementById('theme-icon-light');
  if (t === 'light') {
    document.documentElement.classList.add('light');
    iconDark.style.display = 'none';
    iconLight.style.display = 'block';
    document.querySelector('meta[name="theme-color"]').content = '#f5f5f0';
  } else {
    document.documentElement.classList.remove('light');
    iconDark.style.display = 'block';
    iconLight.style.display = 'none';
    document.querySelector('meta[name="theme-color"]').content = '#111827';
  }
  localStorage.setItem('openear-theme', t);
}

function toggleTheme() {
  applyTheme(theme === 'dark' ? 'light' : 'dark');
}

// ============================================================================
// WEBSOCKET CONNECTION
// ============================================================================
// The client maintains a persistent WebSocket to the server. Two message
// types come from the server:
//   - "status"     → tells us if captioning is on/off (show/hide banners)
//   - "transcript" → a chunk of transcribed text to display
//
// If the connection drops (server restart, network blip), we auto-reconnect
// every 3 seconds and show the "Server Unavailable" banner until it's back.

function getWsUrl() {
  // Match the page's protocol — ws: for http:, wss: for https:
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host + '/ws/captions';
}

function connect() {
  // Clear any pending reconnect timer (e.g., if we're manually reconnecting)
  if (reconnectTimeout) { clearTimeout(reconnectTimeout); reconnectTimeout = null; }

  ws = new WebSocket(getWsUrl());

  ws.onopen = () => {
    setStatus('connected', 'Connected');
    serverDownBanner.classList.remove('visible');
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    // Server tells us whether captioning is active (on connect, and on toggle)
    if (data.type === 'status') {
      isCapturing = data.capturing;
      updateCaptureState();
    }

    // New transcription chunk — append it to the display
    if (data.type === 'transcript' && data.text) {
      appendText(data.text);
    }
  };

  ws.onerror = () => {
    setStatus('error', 'Connection failed');
  };

  ws.onclose = () => {
    setStatus('', 'Disconnected');
    serverDownBanner.classList.add('visible');
    // Hide the "disabled" banner when the server is down — "server unavailable"
    // takes priority and is more accurate
    disabledBanner.classList.remove('visible');
    // Try to reconnect every 3 seconds
    reconnectTimeout = setTimeout(connect, 3000);
  };
}

/**
 * Update the UI based on whether the server is actively captioning.
 * - Capturing ON:  hide "disabled" banner, show empty state if no text yet
 * - Capturing OFF: show "disabled" banner, hide empty state
 */
function updateCaptureState() {
  if (isCapturing) {
    disabledBanner.classList.remove('visible');
    if (transcript.textContent.length === 0) {
      emptyState.classList.remove('hidden');
    }
  } else {
    disabledBanner.classList.add('visible');
    emptyState.classList.add('hidden');
  }
}

// ============================================================================
// AUTO-SCROLL
// ============================================================================
// By default, the transcript auto-scrolls to keep the latest text visible.
// If the user scrolls up to re-read something, we stop auto-scrolling so
// we don't yank them away. When they scroll back to the bottom (within 50px),
// auto-scroll re-engages. No manual lock button needed.

transcriptArea.addEventListener('scroll', () => {
  const atBottom = transcriptArea.scrollHeight - transcriptArea.scrollTop - transcriptArea.clientHeight < 50;
  autoScroll = atBottom;
});

// ============================================================================
// TRANSCRIPT DISPLAY
// ============================================================================

/**
 * Append a new chunk of transcribed text to the transcript area.
 * Each chunk is wrapped in a <span> with a brief fade-in animation.
 * A space is inserted between chunks so the text reads naturally.
 */
function appendText(text) {
  emptyState.classList.add('hidden');
  // Add a space separator between chunks (not before the first one)
  if (transcript.textContent.length > 0) transcript.appendChild(document.createTextNode(' '));
  const span = document.createElement('span');
  span.className = 'chunk chunk-new';
  span.textContent = text;
  transcript.appendChild(span);
  // Remove the animation class after it plays so it doesn't replay on reflow
  setTimeout(() => span.classList.remove('chunk-new'), 350);
  if (autoScroll) transcriptArea.scrollTop = transcriptArea.scrollHeight;
}

function clearTranscript() {
  transcript.innerHTML = '';
  if (isCapturing) emptyState.classList.remove('hidden');
}

/**
 * Update the status badge in the top-left corner.
 * cls controls the visual style (connected=green, error=red, default=gray).
 */
function setStatus(cls, text) {
  statusBadge.className = cls || '';
  statusBadge.id = 'status';
  statusBadge.textContent = text;
}

// ============================================================================
// WAKE LOCK
// ============================================================================
// Prevents the phone/tablet screen from going to sleep while viewing captions.
// Uses the Screen Wake Lock API (supported on modern mobile browsers).
// If the lock is released (e.g., user switches apps), we automatically
// re-acquire it when they come back.

let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      // Re-acquire if released (e.g., tab switch, app switch)
      wakeLock.addEventListener('release', () => requestWakeLock());
    }
  } catch (e) {}
}

// ============================================================================
// INIT
// ============================================================================
// Connect to the server and request a wake lock on page load.

connect();
requestWakeLock();
</script>
</body>
</html>
