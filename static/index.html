<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="/static/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta property="og:image" content="/og-image.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#1a1a2e">
<title>OpenEar</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111827;
    --text: #f1f0eb;
    --text-dim: #9ca3af;
    --accent: #60a5fa;
    --accent-glow: rgba(96, 165, 250, 0.15);
    --danger: #f87171;
    --surface: #1f2937;
    --font-size: 32px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Literata', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  #transcript-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 100px 20px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  #transcript {
    font-size: var(--font-size);
    line-height: 1.55;
    letter-spacing: 0.01em;
    font-weight: 400;
    max-width: 900px;
    margin: 0 auto;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .chunk { display: inline; }

  .chunk-new { animation: fadeIn 0.3s ease-out; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #listening-indicator {
    display: none;
    margin-top: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  #listening-indicator.active {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pulse-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.85); }
    50%      { opacity: 1;   transform: scale(1.1); }
  }

  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: linear-gradient(transparent, var(--bg) 30%);
    z-index: 10;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  #listen-btn {
    font-size: 22px;
    padding: 18px 48px;
    background: var(--accent);
    color: #111827;
    letter-spacing: 0.04em;
    box-shadow: 0 0 0 0 var(--accent-glow);
  }

  #listen-btn:active { transform: scale(0.96); }

  #listen-btn.listening {
    background: var(--danger);
    color: #fff;
    animation: glowPulse 2s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 20px 0 rgba(248, 113, 113, 0.2); }
    50%      { box-shadow: 0 0 30px 8px rgba(248, 113, 113, 0.3); }
  }

  #clear-btn {
    font-size: 15px;
    padding: 14px 24px;
    background: var(--surface);
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  #clear-btn:active { transform: scale(0.96); background: #374151; }

  #size-controls {
    position: fixed;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
    z-index: 20;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  #size-controls:hover, #size-controls:active { opacity: 1; }

  .size-btn {
    width: 40px;
    height: 40px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    color: var(--text-dim);
    border-radius: 10px;
  }

  .size-btn:active { background: #374151; }

  #status {
    position: fixed;
    top: 12px;
    left: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--surface);
    color: var(--text-dim);
    z-index: 20;
    transition: all 0.3s ease;
    opacity: 0.7;
  }

  #status.connected { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
  #status.error { background: rgba(248, 113, 113, 0.15); color: #f87171; opacity: 1; }

  #empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    text-align: center;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #empty-state.hidden { opacity: 0; }
  #empty-state .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
  #empty-state p { font-size: 18px; line-height: 1.6; }

  #transcript-area::-webkit-scrollbar { width: 4px; }
  #transcript-area::-webkit-scrollbar-track { background: transparent; }
  #transcript-area::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="status">Disconnected</div>
  <div id="size-controls">
    <button class="size-btn" onclick="adjustSize(-4)" aria-label="Smaller text">A-</button>
    <button class="size-btn" onclick="adjustSize(4)" aria-label="Larger text">A+</button>
  </div>
  <div id="transcript-area">
    <div id="empty-state">
      <div class="icon">&#127908;</div>
      <p>Tap <strong>Listen</strong> to start<br>live captioning</p>
    </div>
    <div id="transcript"></div>
    <div id="listening-indicator">
      <div class="pulse-dot"></div>
      <span>Listening...</span>
    </div>
  </div>
  <div id="controls">
    <button id="clear-btn" onclick="clearTranscript()">Clear</button>
    <button id="listen-btn" onclick="toggleListening()">Listen</button>
  </div>
</div>
<script>
let isListening = false;
let mediaRecorder = null;
let ws = null;
let audioChunks = [];
let mimeType = '';
const CHUNK_DURATION_MS = 3000;

const listenBtn = document.getElementById('listen-btn');
const transcript = document.getElementById('transcript');
const transcriptArea = document.getElementById('transcript-area');
const indicator = document.getElementById('listening-indicator');
const emptyState = document.getElementById('empty-state');
const statusBadge = document.getElementById('status');

let fontSize = parseInt(localStorage.getItem('caption-font-size') || '32');
document.documentElement.style.setProperty('--font-size', fontSize + 'px');

function adjustSize(delta) {
  fontSize = Math.max(18, Math.min(72, fontSize + delta));
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
  localStorage.setItem('caption-font-size', fontSize);
}

function getWsUrl() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host + '/ws/transcribe';
}

function connectWebSocket() {
  return new Promise((resolve, reject) => {
    ws = new WebSocket(getWsUrl());
    ws.onopen = () => { setStatus('connected', 'Connected'); resolve(); };
    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.text) appendText(data.text);
    };
    ws.onerror = (err) => { setStatus('error', 'Connection failed'); reject(err); };
    ws.onclose = () => {
      setStatus('', 'Disconnected');
      if (isListening) {
        setTimeout(() => { if (isListening) connectWebSocket().catch(() => stopListening()); }, 2000);
      }
    };
  });
}

let audioStream = null;

async function startAudioCapture() {
  audioStream = await navigator.mediaDevices.getUserMedia({
    audio: { channelCount: 1, sampleRate: 16000, echoCancellation: true, noiseSuppression: true }
  });
  mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus' : 'audio/webm';

  startRecordingCycle();
}

function startRecordingCycle() {
  if (!isListening || !audioStream) return;

  audioChunks = [];
  mediaRecorder = new MediaRecorder(audioStream, { mimeType: mimeType });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    if (audioChunks.length > 0 && ws && ws.readyState === WebSocket.OPEN) {
      const blob = new Blob(audioChunks, { type: mimeType });
      blob.arrayBuffer().then(buf => {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(buf);
      });
    }
    if (isListening) startRecordingCycle();
  };

  mediaRecorder.start();
  setTimeout(() => {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  }, CHUNK_DURATION_MS);
}

async function toggleListening() { if (isListening) stopListening(); else await startListening(); }

async function startListening() {
  try {
    listenBtn.textContent = '...'; listenBtn.disabled = true;
    await connectWebSocket();
    isListening = true;
    await startAudioCapture();
    listenBtn.textContent = 'Stop'; listenBtn.classList.add('listening'); listenBtn.disabled = false;
    indicator.classList.add('active'); emptyState.classList.add('hidden');
    requestWakeLock();
  } catch (err) {
    console.error('Start error:', err);
    setStatus('error', 'Mic access denied');
    listenBtn.textContent = 'Listen'; listenBtn.disabled = false;
    stopListening();
  }
}

function stopListening() {
  isListening = false;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    mediaRecorder = null;
  }
  if (audioStream) {
    audioStream.getTracks().forEach(t => t.stop());
    audioStream = null;
  }
  if (ws) { ws.close(); ws = null; }
  audioChunks = [];
  listenBtn.textContent = 'Listen'; listenBtn.classList.remove('listening'); listenBtn.disabled = false;
  indicator.classList.remove('active');
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}

function appendText(text) {
  if (transcript.textContent.length > 0) transcript.appendChild(document.createTextNode(' '));
  const span = document.createElement('span');
  span.className = 'chunk chunk-new';
  span.textContent = text;
  transcript.appendChild(span);
  setTimeout(() => span.classList.remove('chunk-new'), 350);
  transcriptArea.scrollTop = transcriptArea.scrollHeight;
}

function clearTranscript() {
  transcript.innerHTML = '';
  if (!isListening) emptyState.classList.remove('hidden');
}

function setStatus(cls, text) { statusBadge.className = cls || ''; statusBadge.id = 'status'; statusBadge.textContent = text; }

let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { if (isListening) requestWakeLock(); });
    }
  } catch (e) {}
}
</script>
</body>
</html>
